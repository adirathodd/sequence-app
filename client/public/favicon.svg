<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <clipPath id="c">
      <circle cx="16" cy="16" r="16"/>
    </clipPath>
  </defs>

  <!-- Circular background -->
  <circle cx="16" cy="16" r="16" fill="#ffffff"/>

  <!-- Suit symbols clipped to circle, centered in each quadrant -->
  <g clip-path="url(#c)">
    <text x="11" y="11" text-anchor="middle" dominant-baseline="central" font-size="17" font-family="serif" fill="#111111">♠</text>
    <text x="21" y="11" text-anchor="middle" dominant-baseline="central" font-size="17" font-family="serif" fill="#dc2626">♥</text>
    <text x="11" y="21" text-anchor="middle" dominant-baseline="central" font-size="17" font-family="serif" fill="#111111">♣</text>
    <text x="21" y="21" text-anchor="middle" dominant-baseline="central" font-size="17" font-family="serif" fill="#dc2626">♦</text>
  </g>
</svg>